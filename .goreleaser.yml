version: 2

project_name: runqy

before:
  hooks:
    - go -C app mod tidy

builds:
  - id: runqy
    dir: app
    main: .
    binary: runqy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Publikey/runqy/cmd.Version={{.Version}}
      - -X github.com/Publikey/runqy/cmd.GitCommit={{.Commit}}
      - -X github.com/Publikey/runqy/cmd.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: zip
    files:
      - LICENSE*
      - README*

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: publikey
    name: runqy
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
  footer: |
    ## Docker
    ```bash
    docker pull ghcr.io/publikey/runqy:{{ .Tag }}
    ```

dockers_v2:
  - ids: [runqy]
    images:
      - "ghcr.io/publikey/runqy"
    tags:
      - "{{ .Tag }}"
      - "latest"
    dockerfile: Dockerfile.goreleaser
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
