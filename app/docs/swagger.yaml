definitions:
  api.BatchTaskRequest:
    properties:
      jobs:
        items:
          type: object
        type: array
      queue:
        type: string
      timeout:
        description: Default timeout for all jobs
        type: integer
    required:
    - jobs
    - queue
    type: object
  api.BatchTaskResponse:
    properties:
      enqueued:
        type: integer
      errors:
        items:
          type: string
        type: array
      failed:
        type: integer
      task_ids:
        items:
          type: string
        type: array
    type: object
  api.CreateQueueRequest:
    properties:
      deployment:
        $ref: '#/definitions/queueworker.DeploymentConfig'
      name:
        type: string
      priority:
        minimum: 1
        type: integer
      provider:
        type: string
    required:
    - name
    - priority
    type: object
  api.CreateQueueResponse:
    properties:
      message:
        type: string
      queue:
        $ref: '#/definitions/queueworker.QueueConfig'
    type: object
  api.CreateVaultRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  api.HandshakeErrorResponse:
    properties:
      error:
        type: string
    type: object
  api.HandshakeRequest:
    properties:
      hostname:
        type: string
      os:
        type: string
      queue:
        type: string
      version:
        type: string
    type: object
  api.QueuesListResponse:
    properties:
      count:
        type: integer
      queues:
        items:
          $ref: '#/definitions/queueworker.QueueSummary'
        type: array
    type: object
  api.ReloadResponse:
    properties:
      errors:
        items:
          type: string
        type: array
      reloaded:
        items:
          type: string
        type: array
      timestamp:
        type: integer
    type: object
  api.SetEntryRequest:
    properties:
      is_secret:
        description: Defaults to true if not provided
        type: boolean
      key:
        type: string
      value:
        type: string
    required:
    - key
    - value
    type: object
  api.SubQueueConfig:
    properties:
      name:
        type: string
      priority:
        type: integer
    type: object
  api.VaultsListResponse:
    properties:
      count:
        type: integer
      vaults:
        items:
          $ref: '#/definitions/vaults.VaultSummary'
        type: array
    type: object
  api.WorkerConfigResponse:
    properties:
      deployment:
        $ref: '#/definitions/api.WorkerDeploymentConfig'
      git_token:
        description: Resolved git token for authentication
        type: string
      queue:
        $ref: '#/definitions/api.WorkerQueueConfig'
      redis:
        $ref: '#/definitions/api.WorkerRedisConfig'
      sub_queues:
        items:
          $ref: '#/definitions/api.SubQueueConfig'
        type: array
      vaults:
        additionalProperties:
          type: string
        description: Decrypted vault key-value pairs
        type: object
    type: object
  api.WorkerDeploymentConfig:
    properties:
      branch:
        type: string
      code_path:
        type: string
      git_url:
        type: string
      mode:
        type: string
      redis_storage:
        type: boolean
      startup_cmd:
        type: string
      startup_timeout_secs:
        type: integer
      vaults:
        items:
          type: string
        type: array
    type: object
  api.WorkerInfo:
    properties:
      concurrency:
        type: integer
      is_stale:
        description: True if last_beat > 30s ago
        type: boolean
      last_beat:
        type: integer
      queues:
        type: string
      started_at:
        type: integer
      status:
        type: string
      worker_id:
        type: string
    type: object
  api.WorkerQueueConfig:
    properties:
      name:
        type: string
      priority:
        type: integer
    type: object
  api.WorkerRedisConfig:
    properties:
      addr:
        type: string
      db:
        type: integer
      password:
        type: string
      use_tls:
        type: boolean
    type: object
  api.WorkersResponse:
    properties:
      count:
        type: integer
      workers:
        items:
          $ref: '#/definitions/api.WorkerInfo'
        type: array
    type: object
  models.APIErrorResponse:
    properties:
      errors:
        items:
          type: string
        type: array
    type: object
  models.AddTaskInfoDoc:
    properties:
      completedAt:
        type: string
      deadline:
        type: string
      group:
        type: string
      id:
        type: string
      isOrphaned:
        type: boolean
      lastErr:
        type: string
      lastFailedAt:
        type: string
      max_retry:
        type: integer
      nextProcessAt:
        type: string
      payload:
        items:
          type: integer
        type: array
      queue:
        type: string
      result:
        items:
          format: int32
          type: integer
        type: array
      retried:
        type: integer
      state:
        type: string
      type:
        type: string
    type: object
  models.GenericResponsePost:
    properties:
      data:
        type: object
      info:
        $ref: '#/definitions/models.AddTaskInfoDoc'
    type: object
  models.GenericTask:
    properties:
      data:
        type: object
      queue:
        type: string
      timeout:
        type: integer
    type: object
  models.GetTaskInfoDoc:
    properties:
      completedAt:
        type: string
      deadline:
        type: string
      group:
        type: string
      id:
        type: string
      isOrphaned:
        type: boolean
      lastErr:
        type: string
      lastFailedAt:
        type: string
      max_retry:
        type: integer
      nextProcessAt:
        type: string
      payload:
        type: string
      queue:
        type: string
      result:
        type: string
      retried:
        type: integer
      state:
        type: string
      type:
        type: string
    type: object
  models.ResponseGet:
    properties:
      info:
        $ref: '#/definitions/models.GetTaskInfoDoc'
    type: object
  queueworker.DeploymentConfig:
    properties:
      branch:
        type: string
      code_path:
        type: string
      git_token:
        description: 'Vault reference for git auth: "vault://vault-name/key"'
        type: string
      git_url:
        type: string
      mode:
        type: string
      redis_storage:
        type: boolean
      startup_cmd:
        type: string
      startup_timeout_secs:
        type: integer
      vaults:
        description: List of vault names to inject as env vars
        items:
          type: string
        type: array
    type: object
  queueworker.QueueConfig:
    properties:
      created_at:
        type: integer
      deployment:
        $ref: '#/definitions/queueworker.DeploymentConfig'
      name:
        type: string
      priority:
        type: integer
      provider:
        type: string
      updated_at:
        type: integer
    type: object
  queueworker.QueueSummary:
    properties:
      name:
        type: string
      priority:
        type: integer
      provider:
        type: string
    type: object
  vaults.VaultDetail:
    properties:
      created_at:
        type: string
      description:
        type: string
      entries:
        items:
          $ref: '#/definitions/vaults.VaultEntryView'
        type: array
      name:
        type: string
      updated_at:
        type: string
    type: object
  vaults.VaultEntryView:
    properties:
      created_at:
        type: string
      is_secret:
        type: boolean
      key:
        type: string
      updated_at:
        type: string
      value:
        description: Masked if IsSecret is true
        type: string
    type: object
  vaults.VaultSummary:
    properties:
      description:
        type: string
      entry_count:
        type: integer
      name:
        type: string
    type: object
info:
  contact: {}
  description: Task queueing service built on asynq for managing distributed task
    processing
  title: Runqy Queue API
  version: 1.0.0
paths:
  /api/vaults:
    get:
      description: List all vaults with entry counts
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.VaultsListResponse'
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all vaults
      tags:
      - vaults
    post:
      consumes:
      - application/json
      description: Create a new vault with the given name and description
      parameters:
      - description: Vault creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateVaultRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new vault
      tags:
      - vaults
  /api/vaults/{name}:
    delete:
      description: Delete a vault and all its entries
      parameters:
      - description: Vault name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a vault
      tags:
      - vaults
    get:
      description: Get vault details with entries (secret values masked)
      parameters:
      - description: Vault name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/vaults.VaultDetail'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get vault details
      tags:
      - vaults
  /api/vaults/{name}/entries:
    get:
      description: List all entries in a vault (secret values masked)
      parameters:
      - description: Vault name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List vault entries
      tags:
      - vaults
    post:
      consumes:
      - application/json
      description: Set or update a key-value pair in a vault
      parameters:
      - description: Vault name
        in: path
        name: name
        required: true
        type: string
      - description: Entry to set
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.SetEntryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Set a vault entry
      tags:
      - vaults
  /api/vaults/{name}/entries/{key}:
    delete:
      description: Remove a key-value pair from a vault
      parameters:
      - description: Vault name
        in: path
        name: name
        required: true
        type: string
      - description: Entry key
        in: path
        name: key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a vault entry
      tags:
      - vaults
  /queue/{uuid}:
    get:
      consumes:
      - application/json
      description: Retrieve the body of the response or the status of the request
        if has not been processed already.
      parameters:
      - description: The uuid of the task returned from the POST query
        in: path
        name: uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ResponseGet'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIErrorResponse'
      summary: Get the information about the task in the queue and it's response if
        any.
      tags:
      - queue
  /queue/add:
    post:
      consumes:
      - application/json
      description: Send a generic task request with queue, timeout, and a flexible
        JSON payload.
      parameters:
      - description: Task with queue, timeout, and payload
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/models.GenericTask'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.GenericResponsePost'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIErrorResponse'
      summary: Send a new task to the queuer
      tags:
      - queue
  /queue/add-batch:
    post:
      consumes:
      - application/json
      description: Batch enqueue for high-throughput job submission. Uses Redis pipelining
        for optimal performance.
      parameters:
      - description: Batch of tasks with queue and jobs array
        in: body
        name: batch
        required: true
        schema:
          $ref: '#/definitions/api.BatchTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.BatchTaskResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIErrorResponse'
      summary: Send multiple tasks to the queue in a single request
      tags:
      - queue
  /worker/register:
    post:
      consumes:
      - application/json
      description: Register worker and retrieve queue configuration
      parameters:
      - description: Handshake request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.HandshakeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkerConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.HandshakeErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.HandshakeErrorResponse'
      summary: Worker handshake
      tags:
      - workers
  /workers:
    get:
      description: Returns all workers registered in Redis (from asynq:workers:* keys)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkersResponse'
      summary: List all workers
      tags:
      - workers
  /workers/{worker_id}:
    get:
      description: Returns details for a specific worker by ID
      parameters:
      - description: Worker ID
        in: path
        name: worker_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkerInfo'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get worker details
      tags:
      - workers
  /workers/config/{queue_name}:
    get:
      description: Retrieve queue configuration
      parameters:
      - description: Queue name
        in: path
        name: queue_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/queueworker.QueueConfig'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get queue configuration
      tags:
      - workers
  /workers/handshake:
    post:
      consumes:
      - application/json
      description: Register worker and retrieve queue configuration
      parameters:
      - description: Handshake request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.HandshakeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.WorkerConfigResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/api.HandshakeErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/api.HandshakeErrorResponse'
      summary: Worker handshake
      tags:
      - workers
  /workers/queues:
    get:
      description: List all registered queue configurations
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.QueuesListResponse'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all queue configurations
      tags:
      - workers
    post:
      consumes:
      - application/json
      description: Create a new queue configuration from JSON payload
      parameters:
      - description: Queue configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateQueueRequest'
      - description: Force update if queue already exists
        in: query
        name: force
        type: boolean
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/api.CreateQueueResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new queue configuration
      tags:
      - workers
  /workers/queues/{queue_name}:
    delete:
      description: Delete a queue configuration by name (soft-delete)
      parameters:
      - description: Queue name
        in: path
        name: queue_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a queue configuration
      tags:
      - workers
  /workers/queues/{queue_name}/restore:
    post:
      description: Restore a soft-deleted queue configuration by name
      parameters:
      - description: Queue name
        in: path
        name: queue_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Restore a queue configuration
      tags:
      - workers
  /workers/reload:
    post:
      description: Reload all queue configurations from YAML files (admin only)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.ReloadResponse'
      summary: Reload queue configurations from YAML files
      tags:
      - workers
swagger: "2.0"
