queues:
  simple:
    priority: 3
    deployment:
      git_url: "https://github.com/org/simple_task.git"
      branch: "main"
      code_path: "tasks/simple-task"
      startup_cmd: "python main.py"
      mode: "one_shot"
      env_vars: {
          github_token: "env://GITHUB_PAT"
      }
      startup_timeout_secs: 10
    input:
      - name: "operation"
        type: 
          - "string"
      - name: "data"
        type: 
          - "string"
          - "int"
          - "float"
    output:
      - name: "result"
        type:
          - "string"
          - "int"
          - "float"